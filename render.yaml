services:
  - type: web
    name: eventra-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DATABASE_NAME
        value: eventra
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: 1440
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
